<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Café</title>
    <link rel="stylesheet" href="Styles/style.css">
    <script defer src="Javascript/app.js"></script>
</head>
<body>
    <header>

        <h1>Blog Café</h1>
        
        <div id="cabecera">
            <p id="mensaje">Un blog para todos.</p>

            <div id="loggin">
                <form id="form_loggin">
                    <div>
                    <label for="user">Usuario:</label>
                    <input class="caja" type="text" name="user">
                    
                    <label for="pass">Contraseña:</label>
                    <input class="caja" type="password" name="pass">
                    <input class="boton" type="submit" value="Enter.">
                    </div>
                    
                </form>
            </div>

        </div>

    </header>

    <nav id="nav-movil">
        <ul>
            <li><a>Inicio</a></li>
            <li><a>Galeria</a></li>
        </ul>
    </nav>

    <main>

        <aside>
            <ul>
                <li>
                    <a>Inicio.</a>
                </li>
                <li>
                    <a>Galeria.</a>
                </li>
            </ul>

            <div>
                <img id="aside_img" src="Media/img/gadost0-cappuccino-756490.jpg">  

                <div id="reloj"></div>
            </div>     
        </aside>

        <section>
            <article>
                <form style="display: flex; flex-direction: column;">
                    <h3>Publica:</h3>
                    <label for="titulo">Titulo:</label>
                    <input id="titulo" class="caja" type="text" name="titulo">
                    <label for="cuerpo">Contenido:</label>
                    <textarea id="cuerpo" class="caja" type="text" name="cuerpo"></textarea>
                    <label for="imagen">Selecciona una imagen:</label>
                    <input type="file" id="imagenfile" name="imagen" accept="image/*">
                    <input class="boton" type="submit" value="Enter.">
                </form>
            </article>

            <div id="articulos"></div>
        </section>

    </main>
    <footer></footer>
</body>
</html>
